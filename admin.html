<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            margin-bottom: 10px;
        }

        .admin-header p {
            opacity: 0.9;
        }

        .admin-toolbar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .admin-toolbar input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .admin-toolbar button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .admin-toolbar button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #007bff;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card p {
            color: #666;
            font-size: 14px;
        }

        .admin-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .admin-section h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        .message-item {
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .message-item:hover {
            background: #f0f0f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .message-header strong {
            color: #333;
        }

        .message-meta {
            font-size: 12px;
            color: #999;
        }

        .message-content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .message-actions {
            display: flex;
            gap: 10px;
            font-size: 12px;
        }

        .message-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
            transition: all 0.3s;
        }

        .message-actions button:hover {
            background: #ddd;
        }

        .message-actions .delete-btn:hover {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .admin-header {
                padding: 20px;
            }

            .admin-toolbar {
                flex-direction: column;
            }

            .message-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 头部 -->
        <div class="admin-header">
            <h1>👨‍💼 TechCorp 管理后台</h1>
            <p>查看和管理网站的所有消息和订阅者</p>
        </div>

        <!-- 工具栏 -->
        <div class="admin-toolbar">
            <input type="password" id="adminToken" placeholder="请输入Admin Token" value="">
            <button onclick="login()">登录</button>
            <button onclick="loadStats()">刷新统计</button>
            <button onclick="loadMessages()">刷新消息</button>
            <button onclick="logout()">登出</button>
        </div>

        <!-- 消息提示 -->
        <div id="message" style="margin-bottom: 20px;"></div>

        <!-- 统计信息 -->
        <div class="admin-stats" id="statsContainer" style="display:none;">
            <div class="stat-card">
                <h3 id="totalMessages">0</h3>
                <p>总消息数</p>
            </div>
            <div class="stat-card">
                <h3 id="unreadMessages">0</h3>
                <p>未读消息</p>
            </div>
            <div class="stat-card">
                <h3 id="totalSubscribers">0</h3>
                <p>订阅者总数</p>
            </div>
            <div class="stat-card">
                <h3 id="serverUptime">0</h3>
                <p>服务器运行时间</p>
            </div>
        </div>

        <!-- 联系消息 -->
        <div class="admin-section" id="messagesSection" style="display:none;">
            <h2>📧 联系消息</h2>
            <div id="messagesContainer" class="empty-state">
                请先登录并加载数据
            </div>
        </div>

        <!-- 订阅者 -->
        <div class="admin-section" id="subscribersSection" style="display:none;">
            <h2>📬 订阅者列表</h2>
            <div id="subscribersContainer" class="empty-state">
                请先登录并加载数据
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let adminToken = localStorage.getItem('adminToken') || '';

        // 初始化 - 检查是否已登录
        window.addEventListener('load', () => {
            if (adminToken) {
                document.getElementById('adminToken').value = adminToken;
                loadStats();
                loadMessages();
                loadSubscribers();
            }
        });

        /**
         * 登录
         */
        function login() {
            const token = document.getElementById('adminToken').value.trim();
            
            if (!token) {
                showMessage('请输入Admin Token', 'error');
                return;
            }

            // 保存token到本地存储
            adminToken = token;
            localStorage.setItem('adminToken', token);
            
            showMessage('✓ 登录成功', 'success');
            loadStats();
            loadMessages();
            loadSubscribers();
        }

        /**
         * 登出
         */
        function logout() {
            adminToken = '';
            localStorage.removeItem('adminToken');
            document.getElementById('adminToken').value = '';
            document.getElementById('statsContainer').style.display = 'none';
            document.getElementById('messagesSection').style.display = 'none';
            document.getElementById('subscribersSection').style.display = 'none';
            showMessage('已登出', 'success');
        }

        /**
         * 加载统计信息
         */
        function loadStats() {
            if (!adminToken) {
                showMessage('请先输入Admin Token并登录', 'error');
                return;
            }

            fetch(`${API_URL}/api/stats`, {
                headers: {
                    'x-admin-token': adminToken
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('totalMessages').textContent = stats.totalMessages;
                    document.getElementById('unreadMessages').textContent = stats.unreadMessages;
                    document.getElementById('totalSubscribers').textContent = stats.totalSubscribers;
                    document.getElementById('serverUptime').textContent = formatUptime(stats.serverUptime);
                    document.getElementById('statsContainer').style.display = 'grid';
                } else {
                    showMessage('❌ Token错误或已过期', 'error');
                }
            })
            .catch(e => showMessage('加载失败: ' + e.message, 'error'));
        }

        /**
         * 加载所有消息
         */
        function loadMessages() {
            if (!adminToken) return;

            document.getElementById('messagesSection').style.display = 'block';
            document.getElementById('messagesContainer').innerHTML = '<div class="loading">加载中...</div>';

            fetch(`${API_URL}/api/contact`, {
                headers: {
                    'x-admin-token': adminToken
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    displayMessages(data.messages);
                } else {
                    document.getElementById('messagesContainer').innerHTML = '<div class="error-message">❌ 加载失败，Token可能错误</div>';
                }
            })
            .catch(e => {
                document.getElementById('messagesContainer').innerHTML = '<div class="error-message">❌ 加载失败: ' + e.message + '</div>';
            });
        }

        /**
         * 显示消息列表
         */
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无消息</div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message-item">
                    <div class="message-header">
                        <strong>${escapeHtml(msg.name)} (${escapeHtml(msg.email)})</strong>
                        <span class="message-meta">${formatDate(msg.timestamp)}</span>
                    </div>
                    <div><strong>主题:</strong> ${escapeHtml(msg.subject)}</div>
                    <div class="message-content"><strong>内容:</strong><br>${escapeHtml(msg.message)}</div>
                    <div class="message-actions">
                        <button onclick="deleteMessage('${msg.id}')">删除</button>
                        <button onclick="markAsRead('${msg.id}')">标记为已读</button>
                        <button onclick="copyEmail('${msg.email}')">复制邮箱</button>
                    </div>
                </div>
            `).join('');
        }

        /**
         * 加载订阅者列表
         */
        function loadSubscribers() {
            if (!adminToken) return;

            document.getElementById('subscribersSection').style.display = 'block';
            document.getElementById('subscribersContainer').innerHTML = '<div class="loading">加载中...</div>';

            fetch(`${API_URL}/api/newsletter`, {
                headers: {
                    'x-admin-token': adminToken
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    displaySubscribers(data.subscribers);
                } else {
                    document.getElementById('subscribersContainer').innerHTML = '<div class="error-message">❌ 加载失败</div>';
                }
            })
            .catch(e => {
                document.getElementById('subscribersContainer').innerHTML = '<div class="error-message">❌ 加载失败: ' + e.message + '</div>';
            });
        }

        /**
         * 显示订阅者列表
         */
        function displaySubscribers(subscribers) {
            const container = document.getElementById('subscribersContainer');
            
            if (subscribers.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无订阅者</div>';
                return;
            }

            container.innerHTML = subscribers.map((sub, i) => `
                <div class="message-item">
                    <div class="message-header">
                        <strong>${i+1}. ${escapeHtml(sub.email)}</strong>
                        <span class="message-meta">${formatDate(sub.subscribedAt)}</span>
                    </div>
                    <div class="message-actions">
                        <button onclick="copyEmail('${sub.email}')">复制邮箱</button>
                    </div>
                </div>
            `).join('');
        }

        /**
         * 删除消息
         */
        function deleteMessage(id) {
            if (!confirm('确定要删除这条消息吗？')) return;

            fetch(`${API_URL}/api/contact/${id}`, {
                method: 'DELETE',
                headers: {
                    'x-admin-token': adminToken
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✓ 消息已删除', 'success');
                    loadMessages();
                } else {
                    showMessage('❌ 删除失败', 'error');
                }
            })
            .catch(e => showMessage('❌ 删除失败: ' + e.message, 'error'));
        }

        /**
         * 标记为已读
         */
        function markAsRead(id) {
            fetch(`${API_URL}/api/contact/${id}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ status: 'read' })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('✓ 已标记为已读', 'success');
                    loadMessages();
                    loadStats();
                }
            })
            .catch(e => showMessage('❌ 操作失败: ' + e.message, 'error'));
        }

        /**
         * 复制邮箱到剪贴板
         */
        function copyEmail(email) {
            navigator.clipboard.writeText(email).then(() => {
                showMessage('✓ 邮箱已复制到剪贴板', 'success');
            });
        }

        /**
         * 显示消息提示
         */
        function showMessage(msg, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }

        /**
         * 格式化日期时间
         */
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        /**
         * 格式化服务器运行时间
         */
        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${hours}小时${minutes}分钟`;
        }

        /**
         * HTML转义
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
